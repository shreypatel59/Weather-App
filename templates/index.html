<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .search-box {
            position: relative;
            margin-bottom: 30px;
        }

        .search-input-wrapper {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .suggested-cities {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .suggested-city {
            background: #f0f0f0;
            color: #333;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggested-city:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .suggested-label {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 8px;
            display: block;
        }

        .weather-info {
            display: none;
            animation: slideIn 0.3s ease-in;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .weather-info.show {
            display: block;
        }

        .city-name {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 10px;
        }

        .temperature {
            font-size: 3em;
            color: #667eea;
            font-weight: bold;
            margin: 20px 0;
        }

        .description {
            font-size: 1.2em;
            color: #666;
            text-transform: capitalize;
            margin-bottom: 20px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }

        .detail-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .detail-label {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .detail-value {
            color: #333;
            font-size: 1.3em;
            font-weight: bold;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            border-left: 4px solid #c33;
        }

        .error.show {
            display: block;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            border-left: 4px solid #3c3;
        }

        .success.show {
            display: block;
        }

        .loading {
            text-align: center;
            color: #999;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .forecast {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            display: none;
        }

        .forecast.show {
            display: block;
        }

        .forecast h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .forecast-items {
            display: flex;
            gap: 10px;
            overflow-x: auto;
        }

        .forecast-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            min-width: 120px;
            text-align: center;
            flex-shrink: 0;
        }

        .forecast-date {
            font-size: 0.9em;
            color: #999;
            margin-bottom: 5px;
        }

        .forecast-temp {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
        }

        .forecast-desc {
            font-size: 0.8em;
            color: #666;
            margin-top: 5px;
        }

        .timestamp {
            text-align: right;
            color: #999;
            font-size: 0.85em;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌤️ Weather App</h1>

        <div class="search-box">
            <div class="search-input-wrapper">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Enter city name..." 
                    autocomplete="off"
                >
                <button onclick="searchWeather()">Search</button>
            </div>

            <span class="suggested-label">Popular Cities:</span>
            <div class="suggested-cities">
                <button class="suggested-city" onclick="searchCity('London')">🇬🇧 London</button>
                <button class="suggested-city" onclick="searchCity('New York')">🇺🇸 New York</button>
                <button class="suggested-city" onclick="searchCity('Paris')">🇫🇷 Paris</button>
                <button class="suggested-city" onclick="searchCity('Tokyo')">🇯🇵 Tokyo</button>
                <button class="suggested-city" onclick="searchCity('Sydney')">🇦🇺 Sydney</button>
                <button class="suggested-city" onclick="searchCity('Dubai')">🇦🇪 Dubai</button>
                <button class="suggested-city" onclick="searchCity('Singapore')">🇸🇬 Singapore</button>
                <button class="suggested-city" onclick="searchCity('Mumbai')">🇮🇳 Mumbai</button>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <div class="error" id="error"></div>
        <div class="success" id="success"></div>

        <div class="weather-info" id="weatherInfo">
            <div class="city-name" id="cityName"></div>
            <div class="temperature" id="temperature"></div>
            <div class="description" id="description"></div>
            
            <div class="weather-details">
                <div class="detail-box">
                    <div class="detail-label">Feels Like</div>
                    <div class="detail-value" id="feelsLike"></div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">Humidity</div>
                    <div class="detail-value" id="humidity"></div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">Pressure</div>
                    <div class="detail-value" id="pressure"></div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">Wind Speed</div>
                    <div class="detail-value" id="windSpeed"></div>
                </div>
            </div>

            <div class="forecast" id="forecastSection">
                <h3>📅 5-Day Forecast</h3>
                <div class="forecast-items" id="forecastItems"></div>
            </div>

            <div class="timestamp" id="timestamp"></div>
        </div>
    </div>

    <script>
        const cityInput = document.getElementById('cityInput');

        // Allow Enter key to search
        cityInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                searchWeather();
            }
        });

        function searchCity(city) {
            cityInput.value = city;
            searchWeather();
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '❌ ' + message;
            errorDiv.classList.add('show');
            document.getElementById('success').classList.remove('show');
        }

        function hideError() {
            document.getElementById('error').classList.remove('show');
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('success');
            successDiv.textContent = '✅ ' + message;
            successDiv.classList.add('show');
            setTimeout(() => {
                successDiv.classList.remove('show');
            }, 2000);
        }

        async function searchWeather() {
            const city = cityInput.value.trim();

            if (!city) {
                showError('Please enter a city name!');
                return;
            }

            hideError();
            showLoading(true);

            try {
                // Fetch current weather
                const response = await fetch('/api/weather', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ city: city })
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.error || 'Failed to fetch weather data');
                    showLoading(false);
                    return;
                }

                // Display current weather
                document.getElementById('cityName').textContent = 
                    `${data.city}, ${data.country}`;
                document.getElementById('temperature').textContent = 
                    `${data.temperature}°C`;
                document.getElementById('description').textContent = data.description;
                document.getElementById('feelsLike').textContent = 
                    `${data.feels_like}°C`;
                document.getElementById('humidity').textContent = 
                    `${data.humidity}%`;
                document.getElementById('pressure').textContent = 
                    `${data.pressure} hPa`;
                document.getElementById('windSpeed').textContent = 
                    `${data.wind_speed} m/s`;
                document.getElementById('timestamp').textContent = 
                    `Last updated: ${data.timestamp}`;

                document.getElementById('weatherInfo').classList.add('show');
                showSuccess(`Weather for ${data.city} loaded successfully!`);

                // Fetch forecast
                const forecastResponse = await fetch('/api/weather/forecast', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ city: city })
                });

                if (forecastResponse.ok) {
                    const forecastData = await forecastResponse.json();
                    displayForecast(forecastData.forecasts);
                }

            } catch (error) {
                showError('Network error: ' + error.message);
                console.error('Error:', error);
            } finally {
                showLoading(false);
            }
        }

        function displayForecast(forecasts) {
            const forecastSection = document.getElementById('forecastSection');
            const forecastItems = document.getElementById('forecastItems');
            forecastItems.innerHTML = '';

            if (forecasts && forecasts.length > 0) {
                forecasts.forEach(forecast => {
                    const date = new Date(forecast.date);
                    const dateStr = date.toLocaleDateString('en-US', { 
                        month: 'short', 
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    const item = document.createElement('div');
                    item.className = 'forecast-item';
                    item.innerHTML = `
                        <div class="forecast-date">${dateStr}</div>
                        <div class="forecast-temp">${forecast.temperature}°C</div>
                        <div class="forecast-desc">${forecast.description}</div>
                    `;
                    forecastItems.appendChild(item);
                });
                forecastSection.classList.add('show');
            }
        }
    </script>
</body>
</html>
